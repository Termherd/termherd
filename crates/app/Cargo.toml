[package]
name = "termherd-app"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true

[[bin]]
name = "termherd"
path = "src/main.rs"

# The workspace is publish = false (crates.io), but the binary IS shipped
# via dist (GitHub Releases) — opt it in explicitly.
[package.metadata.dist]
dist = true

[dependencies]
termherd-core = { path = "../core" }
termherd-claude = { path = "../claude" }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
single-instance = "0.3"
iced = "0.14"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lints]
workspace = true
