[graph]
all-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    # Boost Software License — OSI-approved permissive; pulled in by iced's
    # Windows clipboard support (clipboard-win, error-code).
    "BSL-1.0",
]
confidence-threshold = 0.8

[advisories]
yanked = "warn"
ignore = [
    # `paste` is unmaintained (no vulnerability) and a transitive dep of
    # iced; drops out whenever iced's tree moves off it.
    { id = "RUSTSEC-2024-0436", reason = "unmaintained, transitive via iced" },
    # `fxhash` is unmaintained (no vulnerability), pulled in transitively by
    # `display-info` (monitor geometry for the off-screen window guard).
    { id = "RUSTSEC-2025-0057", reason = "unmaintained, transitive via display-info" },
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
