[graph]
all-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    # Boost Software License — OSI-approved permissive; pulled in by iced's
    # Windows clipboard support (clipboard-win, error-code).
    "BSL-1.0",
]
confidence-threshold = 0.8

[advisories]
yanked = "warn"
ignore = [
    # `paste` is unmaintained (no vulnerability) and a transitive dep of
    # iced; drops out whenever iced's tree moves off it.
    { id = "RUSTSEC-2024-0436", reason = "unmaintained, transitive via iced" },
    # `fxhash` is unmaintained (no vulnerability), pulled in transitively by
    # `display-info` (monitor geometry for the off-screen window guard).
    { id = "RUSTSEC-2025-0057", reason = "unmaintained, transitive via display-info" },
    # `ttf-parser` is unmaintained (no vulnerability), reached only
    # transitively through iced's font stack: iced → cosmic-text → fontdb →
    # ttf-parser, and sctk-adwaita → ab_glyph → owned_ttf_parser. No safe bump
    # exists — the suggested successor (skrifa, a separate Google Fonts crate)
    # is a rewrite, not a drop-in; drops out whenever iced's tree moves off it.
    { id = "RUSTSEC-2026-0192", reason = "unmaintained, transitive via iced font stack (ttf-parser); no drop-in replacement" },
    # `quick-xml` DoS advisories (< 0.41). Reached only through platform
    # scaffolding that never parses untrusted XML: `wayland-scanner` (^0.39)
    # and `xcb` (^0.30) generate Rust from *build-time* protocol definitions,
    # and `tauri-winrt-notification` (~0.37) builds Windows toast XML from
    # termherd's own notification strings. No network/attacker-controlled input
    # reaches any of them, so the DoS is not exploitable here. No fix available:
    # the latest `xcb`/`wayland-scanner`/`tauri-winrt-notification` still pin
    # quick-xml < 0.41. TODO: drop these once the parents reach quick-xml >=0.41.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml DoS; unreachable — build-time/self-generated XML only, no upgrade path yet" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml DoS; unreachable — build-time/self-generated XML only, no upgrade path yet" },
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
