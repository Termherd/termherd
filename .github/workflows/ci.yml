name: CI

on:
  push:
    branches: [main]
    tags:
      # Release tags also run CI so the cross-OS gate (below) exercises
      # mac/Windows before a release is cut. Same glob as release.yml.
      - '**[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded PR runs so a fresh push doesn't queue behind its own stale
# jobs. Pushes to main are never cancelled: those runs gate the default branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: CI only reads the repo. Jobs that need more request it.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

# Third-party actions are pinned to commit SHAs (version in the trailing
# comment). Bump the SHA and the comment together; never use a mutable tag.
jobs:
  # Which kinds of file changed, so each gate runs only when it's relevant. A
  # docs-only change skips every Rust job; a pure-`.rs` change skips the
  # dependency-metadata jobs; etc. A path-skipped job reports a "skipped" check,
  # which the `ci-success` aggregator (below) treats as non-failure — so the one
  # required check still goes green and a PR is never stuck waiting. Because
  # branch protection pins only `ci-success`, we avoid faceto's "static names,
  # no matrix" pitfall: `cross-os` can stay a matrix, it just isn't required.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      cargo: ${{ steps.filter.outputs.cargo }}
      markdown: ${{ steps.filter.outputs.markdown }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            # `rust` = anything that can change build/lint/test output, plus
            # the source-scanning architecture scripts (they read `.rs` and must
            # re-run when their own rules change).
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'clippy.toml'
              - 'scripts/check-module-boundaries.sh'
              - 'scripts/check-os-cfg-containment.sh'
              - 'scripts/report-file-length.sh'
            # `cargo` = the dependency graph / manifests only, for the
            # metadata-scan gates (deny / machete / dependency-rule). A pure
            # `.rs` change leaves the dep tree untouched and skips these.
            cargo:
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'scripts/check-crate-deps.sh'
            markdown:
              - '**/*.md'
              - '.markdownlint-cli2.jsonc'
            workflows:
              - '.github/workflows/**'

  fmt:
    name: rustfmt
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # `toolchain` must match rust-toolchain.toml / Cargo.toml rust-version (Q10);
      # this pinned action requires the input explicitly. Keep the three in sync.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --all --check

  # clippy + test run ubuntu-only on every PR (the fast merge gate). mac +
  # Windows are covered by the `cross-os` job below, which is skipped on PRs
  # and runs on push→main and release tags. See docs/CI.md §3.
  clippy:
    name: clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.95.0"   # keep in lockstep with rust-toolchain.toml (Q10)
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.95.0"   # keep in lockstep with rust-toolchain.toml (Q10)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: nextest
      - run: cargo nextest run --workspace

  # Cross-OS coverage: clippy + tests on macOS and Windows. Skipped on PRs to
  # keep the merge gate fast/cheap; runs on push→main (post-merge baseline) and
  # on release tags so platform-specific breakage surfaces before a release. A
  # red run here does NOT block cargo-dist's release.yml (separate workflow) —
  # it is a signal, not a hard gate. See docs/CI.md §3.
  cross-os:
    name: cross-os (${{ matrix.os }})
    needs: changes
    # Non-PR only, and only when Rust actually changed — except on release
    # tags, where it always runs to validate the release across platforms.
    if: >-
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.rust == 'true' || github.ref_type == 'tag')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.95.0"   # keep in lockstep with rust-toolchain.toml (Q10)
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: nextest
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo nextest run --workspace

  deny:
    name: cargo-deny
    needs: changes
    if: needs.changes.outputs.cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: cargo-deny
      - run: cargo deny check

  machete:
    name: cargo-machete
    needs: changes
    if: needs.changes.outputs.cargo == 'true'
    runs-on: ubuntu-latest
    # Fail when a crate declares a dependency it no longer uses — unused deps
    # add build time and supply-chain surface. Fast, ubuntu-only: a metadata +
    # source scan, no full build. Tool version is pinned (bump it together with
    # this comment); the install-action itself is SHA-pinned like every action.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiki-e/install-action@d9be7d8cda89035c9c843f78bd44d4f72d8403d4 # v2.79.7
        with:
          tool: cargo-machete@0.9.2
      - run: cargo machete

  deps:
    name: dependency-rule
    needs: changes
    if: needs.changes.outputs.cargo == 'true'
    runs-on: ubuntu-latest
    # Architecture fitness function: the hexagonal dependency rule (adapters
    # depend on core, never the reverse) holds by construction, not by reviewer
    # vigilance. Pure `cargo metadata` parse — no build, ubuntu-only (the graph
    # is platform-independent). jq is preinstalled on ubuntu-latest runners.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.95.0"   # keep in lockstep with rust-toolchain.toml (Q10)
      - run: ./scripts/check-crate-deps.sh

  intra-arch:
    name: intra-crate-arch
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    # Intra-crate architecture fitness functions — one level below the
    # crate dependency rule (`deps`). The split-up refactor (clusters A–E) built
    # module walls *inside* crates; these keep them standing by construction.
    # Pure grep/find over source — no build, no toolchain, ubuntu-only.
    #   - module boundaries: leaf modules stay leaves, renderers don't reach
    #     executors, core::app submodules go through the parent registry.
    #   - OS-cfg containment: compile-time `#[cfg(target_os)]` stays in its
    #     audited homes (same spirit as the `unsafe_code` quarantine).
    #   - file-length: report-only signal (never fails), written to the summary.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: ./scripts/check-module-boundaries.sh
      - run: ./scripts/check-os-cfg-containment.sh
      - run: ./scripts/report-file-length.sh

  actionlint:
    name: actionlint
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    # release.yml is generated by cargo-dist and trips shellcheck info/style
    # notes (SC2086/SC2129) we don't own. Drop those severities so actionlint
    # still catches real warnings/errors in our own workflows.
    env:
      SHELLCHECK_OPTS: --severity=warning
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install actionlint
        # taiki-e/install-action does not ship actionlint and the crate has
        # no prebuilt binaries, so we use the upstream downloader — pinned to
        # actionlint's v1.7.12 commit and verified by sha256 before running, so
        # this is never an unverified `curl | bash`.
        id: install
        env:
          ACTIONLINT_SHA: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
          DOWNLOADER_SHA256: 72fa3e45ac20f3c3a512d6747b4fcf719e21f890e8c43e78d48a41fdfb900c4e
        run: |
          curl -fsSL -o download-actionlint.bash \
            "https://raw.githubusercontent.com/rhysd/actionlint/${ACTIONLINT_SHA}/scripts/download-actionlint.bash"
          echo "${DOWNLOADER_SHA256}  download-actionlint.bash" | sha256sum --check --status
          bash download-actionlint.bash 1.7.12
          echo "path=$(pwd)/actionlint" >> "$GITHUB_OUTPUT"
      - name: Run actionlint
        run: ${{ steps.install.outputs.path }} -color

  markdown:
    name: markdownlint
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: '**/*.md'
          config: '.markdownlint-cli2.jsonc'

  # Single required status check for the `main` branch-protection rule. It
  # `needs:` every per-PR gate, so protection pins one stable name
  # (`ci-success`) that never changes as jobs are added or removed. `cross-os`
  # is intentionally excluded — it is skipped on PRs and is a signal, not a
  # merge gate. `if: always()` so this job still runs (and fails) when a
  # dependency fails rather than being skipped.
  #
  # Path-filtered gates that don't apply to a change report `skipped`, which is
  # NOT `failure`/`cancelled` — so a docs-only PR (all Rust jobs skipped) still
  # goes green here. `changes` is in `needs` so a filter-detection failure (or a
  # cancel) does fail the gate rather than waving the PR through. See docs/CI.md.
  ci-success:
    name: ci-success
    if: always()
    needs: [changes, fmt, clippy, test, deny, machete, deps, intra-arch, actionlint, markdown]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required CI jobs failed or were cancelled."
          exit 1
